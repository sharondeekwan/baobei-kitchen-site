<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="BaoBei Kitchen dumpling mascots">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="75%">
      <stop offset="0%" stop-color="#E3F4E0"/>
      <stop offset="100%" stop-color="#B4D8B8"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Chef dumpling (larger, left) -->
  <g transform="translate(470 330)">
    <!-- Chef hat -->
    <ellipse cx="0" cy="-150" rx="78" ry="36" fill="#FFFFFF" stroke="#463728" stroke-width="3.5"/>
    <path d="M -62 -130 Q -62 -95 -58 -85 L 58 -85 Q 62 -95 62 -130 Z" fill="#FFFFFF" stroke="#463728" stroke-width="3.5"/>
    <!-- Hat band -->
    <rect x="-64" y="-90" width="128" height="14" rx="4" fill="#463728" opacity="0.08"/>

    <!-- Body -->
    <ellipse cx="0" cy="0" rx="130" ry="118" fill="#FFFFFF" stroke="#463728" stroke-width="4.5"/>
    <!-- Pleats -->
    <path d="M -95 -62 Q -70 -88 -45 -62 Q -22 -88 0 -62 Q 22 -88 45 -62 Q 70 -88 95 -62"
          fill="none" stroke="#463728" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Eyes -->
    <circle cx="-40" cy="-5" r="9" fill="#463728"/>
    <circle cx="40" cy="-5" r="9" fill="#463728"/>
    <circle cx="-37" cy="-8" r="3" fill="#FFFFFF"/>
    <circle cx="43" cy="-8" r="3" fill="#FFFFFF"/>
    <!-- Smile -->
    <path d="M -28 38 Q 0 60 28 38" fill="none" stroke="#463728" stroke-width="4" stroke-linecap="round"/>
    <!-- Blush -->
    <ellipse cx="-72" cy="22" rx="14" ry="9" fill="#F5B7A1" opacity="0.6"/>
    <ellipse cx="72" cy="22" rx="14" ry="9" fill="#F5B7A1" opacity="0.6"/>
  </g>

  <!-- Baby dumpling (smaller, right) -->
  <g transform="translate(790 380)">
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="88" ry="80" fill="#FFFFFF" stroke="#463728" stroke-width="4"/>
    <!-- Pleats -->
    <path d="M -62 -42 Q -42 -60 -21 -42 Q 0 -60 21 -42 Q 42 -60 62 -42"
          fill="none" stroke="#463728" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Eyes -->
    <circle cx="-24" cy="0" r="6.5" fill="#463728"/>
    <circle cx="24" cy="0" r="6.5" fill="#463728"/>
    <circle cx="-22" cy="-2" r="2" fill="#FFFFFF"/>
    <circle cx="26" cy="-2" r="2" fill="#FFFFFF"/>
    <!-- Smile -->
    <path d="M -16 22 Q 0 36 16 22" fill="none" stroke="#463728" stroke-width="3" stroke-linecap="round"/>
    <!-- Blush -->
    <ellipse cx="-48" cy="14" rx="10" ry="6" fill="#F5B7A1" opacity="0.6"/>
    <ellipse cx="48" cy="14" rx="10" ry="6" fill="#F5B7A1" opacity="0.6"/>
  </g>

  <!-- Wordmark -->
  <text x="600" y="560" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif"
        font-size="46" font-weight="600" fill="#463728" text-anchor="middle" letter-spacing="0.5">BaoBei Kitchen</text>
</svg>
